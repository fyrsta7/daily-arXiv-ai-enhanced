name: research-auto-code-optimization-filter

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: First source date (YYYY-MM-DD)
        required: true
        default: "2026-04-18"
        type: string
      end_date:
        description: Last source date (YYYY-MM-DD)
        required: true
        type: string
      threshold:
        description: Minimum strong-relevance score
        required: true
        default: "0.82"
        type: string

permissions:
  contents: write

concurrency:
  group: research-auto-code-optimization-filter
  cancel-in-progress: false

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync

    - name: Check out data branch
      run: |
        git fetch origin data
        git worktree add data-branch origin/data

    - name: Select papers strongly related to automatic code optimization
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        MODEL_NAME: ${{ vars.MODEL_NAME }}
      run: |
        source .venv/bin/activate
        python3 scripts/filter_research_direction.py \
          --data-dir data-branch/data \
          --output-dir data-branch/data/research/auto-code-optimization \
          --start-date "${{ inputs.start_date }}" \
          --end-date "${{ inputs.end_date }}" \
          --threshold "${{ inputs.threshold }}" \
          --batch-size 16 \
          --max-workers 8

    - name: Commit collection to data branch
      env:
        START_DATE: ${{ inputs.start_date }}
        END_DATE: ${{ inputs.end_date }}
        EMAIL: ${{ vars.EMAIL }}
        NAME: ${{ vars.NAME }}
      run: |
        git -C data-branch config user.email "$EMAIL"
        git -C data-branch config user.name "$NAME"
        git -C data-branch add data/research/auto-code-optimization
        if git -C data-branch diff --staged --quiet; then
          echo "No research collection changes to publish"
        else
          git -C data-branch commit -m \
            "research: automatic code optimization papers ${START_DATE} through ${END_DATE}"
          git -C data-branch pull --rebase origin data
          git -C data-branch push origin HEAD:data
        fi
